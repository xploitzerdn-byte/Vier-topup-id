<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ZerNism AI Code Generator</title>

<style>
body{
font-family:Arial,sans-serif;
background:#161616;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.login-box,
.box{
background:#000000;
padding:30px;
border-radius:30px;
border:1px solid white;
width:300px;
box-sizing:border-box;
}

.box{
display:none;
max-width:800px;
width:95%;
height:90vh;
overflow:auto;
}

input,textarea,select{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid white;
border-radius:12px;
background:#282626;
color:white;
box-sizing:border-box;
}

input::placeholder,
textarea::placeholder{
color:white;
}

button{
width:100%;
padding:12px;
background:#a60606;
color:#ffffff;
border:none;
border-radius:12px;
cursor:pointer;
margin-top:8px;
}

button:hover{
background:#8f0505;
}

.password-box{
position:relative;
width:100%;
}

.password-box input{
width:100%;
height:42px;
box-sizing:border-box;
padding-right:60px;
font-size:14px;
}

.toggle-btn{
position:absolute;
right:5px;
top:50%;
transform:translateY(-50%);
width:auto;
padding:6px 12px;
font-size:14px;
background:#a60606;
color:#ffffff;
border:none;
cursor:pointer;
}

h2{
text-align:center;
margin-bottom:25px;
}

textarea{
height:100px;
}

.out{
background:#1a1a1a;
padding:15px;
margin-top:15px;
border-radius:12px;
display:none;
border: 1px dashed #555;
}

#outputCode{
height: 200px;
font-family: 'Courier New', Courier, monospace;
font-size: 13px;
background: #0d0d0d;
}

.footer{
text-align:center;
margin-top:35px;
color:#666;
font-size:10px;
}

small{
color:#aaa;
display: block;
margin-top: 5px;
}

hr{
border:1px solid #333;
margin:20px 0;
}

iframe {
width: 100%;
height: 200px;
background: white;
border: none;
border-radius: 12px;
margin-top: 10px;
}

.status-ai {
color: #00ff88;
font-weight: bold;
margin-bottom: 10px;
display: block;
}
</style>
</head>

<body>

<div class="login-box" id="loginPage">

<div class="password-box">
<input type="text" placeholder="Username" id="dinda123" maxlength="8">
</div>

<div class="password-box">
<input type="password" placeholder="Password" id="dindackp25" maxlength="7">
<button type="button" class="toggle-btn" onclick="sensor()">lihat</button>
</div>

<button onclick="ceklogin()">Masuk</button>

</div>

<div class="box" id="dashboard">

<h2>AI Code Gen by ./ZerNism👑</h2>

<div>
<label><b>Pilih Bahasa Pemrograman:</b></label>
<select id="bahasa">
<option value="html">HTML / CSS / JS (Web)</option>
<option value="python">Python (Script)</option>
<option value="javascript">JavaScript (Node.js)</option>
</select>

<label><b>Deskripsikan Kodingan yang Kamu Mau:</b></label>
<textarea id="promptAI" placeholder="Contoh: Bikin halaman login hacker keren, atau script bot telegram asinkron..."></textarea>

<button onclick="generateAICode()">✨ Generate Code</button>

<!-- AREA HASIL AI -->
<div id="hasilAI" class="out">
<span class="status-ai">🤖 ./ZerNism-AI Engine:</span>
<textarea id="outputCode" readonly></textarea>

<button onclick="salinKode()" class="btn-gray" style="background:#444; margin-bottom: 10px;">📋 Salin Kode</button>

<!-- Tempat Preview Khusus HTML -->
<div id="previewContainer" style="display:none;">
<hr>
<b>Live Preview:</b>
<iframe id="previewFrame"></iframe>
</div>
</div>
</div>

<div class="footer">tool by ./ZerNism👑 • vibe coding</div>

</div>

<script>

function ceklogin(){
let user=document.getElementById("dinda123").value;
let password=document.getElementById("dindackp25").value;

if(user.toLowerCase()=="dinda123" && password=="dinda25"){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="block";
}else{
alert("Username atau password salah!");
}
}

function sensor(){
let x=document.getElementById("dindackp25");
if(x.type==="password"){
x.type="text";
}else{
x.type="password";
}
}

// Logika AI Simulator
function generateAICode(){
var prompt = document.getElementById("promptAI").value.toLowerCase();
var bahasa = document.getElementById("bahasa").value;
var outputBox = document.getElementById("outputCode");
var hasilContainer = document.getElementById("hasilAI");
var previewContainer = document.getElementById("previewContainer");

if(!prompt){
alert("Isi prompt/deskripsinya dulu!");
return;
}

document.getElementById("hasilAI").style.display = "block";
outputBox.value = "Sedang memikirkan kode terbaik... ⚡";
previewContainer.style.display = "none";

setTimeout(function(){
var hasilKode = "";

if(bahasa === "html"){
if(prompt.includes("login") || prompt.includes("hacker")){
hasilKode = `<!-- Generated by ./ZerNism AI -->\n<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { background: #000; color: #00ff00; font-family: monospace; text-align: center; padding-top: 50px; }\n  .box { border: 1px solid #00ff00; display: inline-block; padding: 20px; box-shadow: 0 0 15px #00ff00; }\n  input { background: #111; color: #00ff00; border: 1px solid #00ff00; padding: 8px; margin: 5px; }\n  button { background: #00ff00; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }\n</style>\n</head>\n<body>\n<div class="box">\n  <h2>ACCESS DENIED - LOGIN REQUIRED</h2>\n  <input type="text" placeholder="Username"><br>\n  <input type="password" placeholder="Password"><br>\n  <button onclick="alert('Exploit Sent!')">BYPASS</button>\n</div>\n</body>\n</html>`;
} else {
hasilKode = `<!-- Generated by ./ZerNism AI -->\n<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { background: #222; color: #fff; font-family: sans-serif; text-align: center; }\n  .card { background: #333; margin: 50px auto; width: 300px; padding: 20px; border-radius: 10px; }\n</style>\n</head>\n<body>\n  <div class="card">\n    <h1>Custom Web AI</h1>\n    <p>Prompt: "${prompt}"</p>\n  </div>\n</body>\n</html>`;
}

// Aktifkan Live Preview khusus HTML
previewContainer.style.display = "block";
var blob = new Blob([hasilKode], {type: "text/html"});
document.getElementById("previewFrame").src = URL.createObjectURL(blob);

} else if(bahasa === "python") {
if(prompt.includes("bot") || prompt.includes("telegram") || prompt.includes("async")){
hasilKode = `# Generated by ./ZerNism AI\nimport asyncio\nfrom aiogram import Bot, Dispatcher, types\n\nAPI_TOKEN = 'TOKEN_BOT_KAMU'\nbot = Bot(token=API_TOKEN)\ndp = Dispatcher(bot)\n\n@dp.message_handler(commands=['start'])\nasync def send_welcome(message: types.Message):\n    await message.reply("Halo! Bot Asinkron ./ZerNism siap digunakan.")\n\nasync def main():\n    await dp.start_polling()\n\nif __name__ == '__main__':\n    asyncio.run(main())`;
} else {
hasilKode = `# Generated by ./ZerNism AI\nimport os\n\ndef main():\n    print("Menjalankan task untuk: ${prompt}")\n\nif __name__ == "__main__":\n    main()`;
}
} else if(bahasa === "javascript") {
hasilKode = `// Generated by ./ZerNism AI\nconst fs = require('fs');\n\nconsole.log("Memproses permintaan: ${prompt}");\n// Kode automation kamu di sini\n`;
}

outputBox.value = hasilKode;
}, 1200); // Efek loading 1.2 detik biar berasa mikir
}

function salinKode(){
var copyText = document.getElementById("outputCode");
copyText.select();
navigator.clipboard.writeText(copyText.value);
alert("Kode AI berhasil disalin!");
}

</script>

</body>
  </html>
